<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classificação Final</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
}
header {
    background: #1e3a8a;
    color: white;
    padding: 15px;
    text-align: center;
}
nav {
    background: #2563eb;
    padding: 10px;
    text-align: center;
}
nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-weight: bold;
}
.container {
    padding: 20px;
}
table {
    border-collapse: collapse;
    width: 100%;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
th, td {
    padding: 10px;
    text-align: center;
}
th {
    background: #2563eb;
    color: white;
}
tr:nth-child(even) {
    background: #f2f2f2;
}
tr:hover {
    background: #e0e7ff;
}
</style>
</head>
<body>

<header>
<h1>Classificação Final</h1>
</header>

<nav>
<a href="Caléndario.html">Caléndario</a> <a href="Classificação_Grupo.html">Classificação Grupo</a> <a href="Fase_Final.html">Fase Final</a> <a href="Classificação_Final.html">Classificação Final</a>
</nav>

<div class="container">
<table id="tabela"></table>
</div>

<script>
fetch('Classificação_Final.csv')
.then(res => res.text())
.then(data => {
    const rows = data.trim().split('\n');
    const table = document.getElementById('tabela');

    rows.forEach((row, index) => {
        const tr = document.createElement('tr');
        row.split(',').forEach(cell => {
            const el = document.createElement(index === 0 ? 'th' : 'td');
            el.innerText = cell;
            tr.appendChild(el);
        });
        table.appendChild(tr);
    });
});
</script>

</body>
</html>
